# 태그(v*) 푸시 시 자동 릴리스: 테스트 → publish → vpk pack(델타) → GitHub Release 업로드
# 사용법: bump-version.ps1 실행 (csproj <Version> 범프 + 태그 + 푸시)
# 수동 실행(workflow_dispatch): 빌드/테스트/publish만 수행 — 릴리스 업로드 없음 (파이프라인 검증용)
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 릴리스 생성/자산 업로드

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Version from tag
        id: ver
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart("v")
            # 안정판 vX.Y.Z 또는 베타 vX.Y.Z-beta.N 만 허용 — 그 외 태그는 발행 차단(비정식 버전이 채널에 못 들어가게)
            if ($v -notmatch '^\d+\.\d+\.\d+(-beta\.\d+)?$') {
              throw "invalid release tag '${{ github.ref_name }}' -> '$v' (expected X.Y.Z or X.Y.Z-beta.N)"
            }
            # 베타는 별도 채널 'beta' + GitHub prerelease 플래그로 격리 → 안정 설치본(win 채널)엔 안 뜸
            if ($v -like '*-beta*') { $ch = 'beta'; $pre = 'true' } else { $ch = 'win'; $pre = 'false' }
          } else {
            $v = "0.0.0"; $ch = 'win'; $pre = 'false'   # workflow_dispatch 검증 실행
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          "channel=$ch" >> $env:GITHUB_OUTPUT
          "is_pre=$pre" >> $env:GITHUB_OUTPUT

      # 별도 스텝으로 분리 — pwsh는 마지막 명령의 종료코드만 전파해 앞 스텝 실패가 가려짐
      - name: Test (Core)
        run: dotnet test tests/ClaudeUsageMonitor.Core.Tests -c Release

      - name: Test (Installer)
        run: dotnet test tests/ClaudeUsageMonitor.Installer.Tests -c Release

      - name: Publish (self-contained single exe)
        run: >-
          dotnet publish src/ClaudeUsageMonitor.App -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts/publish

      - name: Install vpk
        if: github.ref_type == 'tag'
        run: dotnet tool install -g vpk

      # 이전 릴리스를 받아두면 vpk가 델타 패키지를 생성 (자동 업데이트 다운로드 최소화)
      - name: Download previous release for deltas
        if: github.ref_type == 'tag'
        continue-on-error: true   # 첫 릴리스에는 이전 릴리스가 없음
        run: >-
          vpk download github --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }} --channel ${{ steps.ver.outputs.channel }}
          -o artifacts/installer

      # 코드서명 (선택): 저장소 시크릿 VPK_SIGN_PARAMS에 signtool 인자를 넣으면 서명 활성화
      #   예) Azure Trusted Signing:
      #       /v /fd SHA256 /tr http://timestamp.acs.microsoft.com /td SHA256
      #       /dlib "...\Azure.CodeSigning.Dlib.dll" /dmdf "...\metadata.json"
      #   시크릿이 없으면 무서명 팩 (SmartScreen 경고 발생)
      - name: Pack installer
        if: github.ref_type == 'tag'
        env:
          VPK_SIGN_PARAMS: ${{ secrets.VPK_SIGN_PARAMS }}
        run: |
          $packArgs = @(
            'pack',
            '--channel', '${{ steps.ver.outputs.channel }}',
            '--packId', 'AgentUsageMonitor',
            '--packVersion', '${{ steps.ver.outputs.version }}',
            '--packDir', 'artifacts/publish',
            '--mainExe', 'Agent Usage Monitor.exe',
            '--packTitle', 'Agent Usage Monitor',
            '--packAuthors', 'WeaverLoft inc. AILabs',
            '--icon', 'src/ClaudeUsageMonitor.App/Assets/icon.ico',
            '--splashImage', 'src/ClaudeUsageMonitor.App/Assets/splash.png',
            '-o', 'artifacts/installer'
          )
          if ($env:VPK_SIGN_PARAMS) {
            Write-Host 'code signing enabled'
            $packArgs += @('--signParams', $env:VPK_SIGN_PARAMS)
          }
          else {
            Write-Host 'no VPK_SIGN_PARAMS secret - packing unsigned'
          }
          vpk @packArgs

      # 커스텀 브랜드 인스톨러 (v2.0.0+) — 릴리스 "공개 전"에 빌드해 실패 시 릴리스 자체를 중단
      # (공개 후 빌드하면 실패 시 README가 안내하는 자산이 없는 릴리스가 라이브로 남음)
      - name: Publish custom installer (self-contained single exe, Setup embedded for offline install)
        if: github.ref_type == 'tag' && !contains(github.ref_name, '-beta')
        run: |
          # Design C: 위 vpk pack이 만든 Setup.exe를 인스톨러에 임베드 → 네트워크 없이도(오프라인) 설치.
          # Setup가 없으면 Resolve-Path가 실패해 스텝이 중단됨(임베드 없는 인스톨러가 조용히 배포되는 것 방지).
          $setup = (Resolve-Path 'artifacts/installer/AgentUsageMonitor-win-Setup.exe').Path
          Write-Host "embedding Setup for offline install: $setup"
          dotnet publish src/ClaudeUsageMonitor.Installer -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:Version=${{ steps.ver.outputs.version }} -p:EmbeddedSetupPath="$setup" -o artifacts/installer-app
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          # GitHub는 자산명 공백을 점으로 바꾸므로 하이픈 이름으로 복사
          Copy-Item "artifacts/installer-app/Agent Usage Monitor Installer.exe" "artifacts/installer-app/AgentUsageMonitor-Installer.exe"

      - name: Upload GitHub release
        if: github.ref_type == 'tag'
        run: |
          $uploadArgs = @(
            'upload', 'github',
            '--repoUrl', 'https://github.com/${{ github.repository }}',
            '--token', '${{ secrets.GITHUB_TOKEN }}',
            '--publish',
            '--channel', '${{ steps.ver.outputs.channel }}',
            '--releaseName', 'Agent Usage Monitor ${{ steps.ver.outputs.version }}',
            '--tag', '${{ github.ref_name }}',
            '--targetCommitish', '${{ github.sha }}',
            '-o', 'artifacts/installer'
          )
          # 베타는 GitHub prerelease 플래그로도 표시 → GithubSource(prerelease:false) 외곽 차단 이중화
          if ('${{ steps.ver.outputs.is_pre }}' -eq 'true') { $uploadArgs += '--pre' }
          vpk @uploadArgs

      - name: Attach custom installer to release
        if: github.ref_type == 'tag' && !contains(github.ref_name, '-beta')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} "artifacts/installer-app/AgentUsageMonitor-Installer.exe" --repo ${{ github.repository }} --clobber

      # 커스텀 Installer.exe가 Setup를 임베드(오프라인 설치)하고 인앱 업데이트는 nupkg를 쓰므로
      # standalone Setup.exe 공개 자산은 불필요 → 게시본에서 제거. (위 vpk pack이 만든 아티팩트는 임베드 소스로 이미 사용됨.)
      - name: Remove standalone Setup.exe from the published release
        if: github.ref_type == 'tag' && !contains(github.ref_name, '-beta')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $rel = gh api "/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -eq 'AgentUsageMonitor-win-Setup.exe' }
          if ($asset) {
            gh api -X DELETE "/repos/${{ github.repository }}/releases/assets/$($asset.id)"
            Write-Host "removed release asset: AgentUsageMonitor-win-Setup.exe (id $($asset.id))"
          }
          else {
            Write-Host "Setup.exe asset not present - nothing to remove"
          }
